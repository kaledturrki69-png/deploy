services:
  - type: web
    name: jekjob-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn main.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"
      - key: OPENAI_BASE_URL
        value: "https://generativelanguage.googleapis.com/v1beta/openai/"
      - key: OPENAI_CHAT_MODEL
        value: "gemini-2.5-flash"
      - key: OPENAI_EMBEDDING_MODEL
        value: "text-embedding-004"
      - key: DEFAULT_LANGUAGE
        value: "fr"
      - key: POSTGRES_HOST
        value: "aws-0-eu-central-1.pooler.supabase.com"
      - key: POSTGRES_PORT
        value: "5432"
      - key: POSTGRES_USER
        value: "postgres.annmluavegijjaxsnvmh"
      - key: POSTGRES_DB
        value: "postgres"
      - key: POSTGRES_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: "https://deploy-ftj4.onrender.com"
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: "https://deploy-ftj4.onrender.com"
